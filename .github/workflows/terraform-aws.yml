name: Terraform — AWS Infrastructure

on:
  pull_request:
    paths:
      - "infra/aws/**"
      - ".github/workflows/terraform-aws.yml"
  push:
    branches: [main]
    paths:
      - "infra/aws/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to plan/apply"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read
  pull-requests: write  # Required to post plan as PR comment

env:
  AWS_REGION: ap-south-1
  TF_VERSION: "1.7.5"
  TARGET_ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }} — AWS ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    defaults:
      run:
        working-directory: infra/aws/environments/${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init -backend-config=backend.tf \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="github_repo=${{ secrets.GITHUB_REPO }}" \
            -var="state_bucket_name=${{ secrets.TF_STATE_BUCKET_AWS }}"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="github_repo=${{ secrets.GITHUB_REPO }}" \
            -var="state_bucket_name=${{ secrets.TF_STATE_BUCKET_AWS }}" \
            -out=tfplan 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      # Post plan as PR comment (only on pull_request event)
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n\n... (truncated)' : plan;
            const output = `#### Terraform Plan — AWS \`${{ env.TARGET_ENV }}\`
            **Format**: \`${{ steps.fmt.outcome }}\` | **Init**: \`${{ steps.init.outcome }}\` | **Validate**: \`${{ steps.validate.outcome }}\` | **Plan**: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply
        if: |
          github.event_name == 'push' && github.ref == 'refs/heads/main' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: |
          terraform apply -auto-approve \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="github_repo=${{ secrets.GITHUB_REPO }}" \
            -var="state_bucket_name=${{ secrets.TF_STATE_BUCKET_AWS }}"

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="github_repo=${{ secrets.GITHUB_REPO }}" \
            -var="state_bucket_name=${{ secrets.TF_STATE_BUCKET_AWS }}"
